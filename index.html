<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gala Royale">
<meta name="theme-color" content="#0a0a0a">
<title>Gala Royale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;
  --border:rgba(255,255,255,.08);--accent:#c9a84c;--accent2:#e8cd87;
  --purple:#7f77dd;--text:#f5f5f5;--muted:#888;--success:#4caf50;
  --danger:#e53935;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow-x:hidden}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,14,14,.97);backdrop-filter:blur(12px);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--safe-bot);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:var(--muted);font-family:'Barlow',sans-serif;font-size:9px;font-weight:500;letter-spacing:.3px;cursor:pointer;transition:color .2s;text-transform:uppercase}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px}

/* PAGES */
.page{display:none;padding-bottom:calc(70px + var(--safe-bot))}
.page.active{display:block}

/* HEADER */
.page-header{padding:calc(var(--safe-top) + 16px) 20px 16px;position:sticky;top:0;background:rgba(10,10,10,.93);backdrop-filter:blur(12px);z-index:50;border-bottom:.5px solid var(--border)}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}

/* SCORE HERO */
.score-hero{padding:24px 20px 20px;background:linear-gradient(160deg,#12100a 0%,var(--bg) 60%);border-bottom:.5px solid var(--border)}
.score-greeting{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.score-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;line-height:1;text-transform:uppercase;margin-bottom:20px}
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden}
.stat-box{background:var(--surface);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center}

/* PHASE PILLS */
.phase-scroll{overflow-x:auto;display:flex;gap:8px;padding:16px 20px;scrollbar-width:none}
.phase-scroll::-webkit-scrollbar{display:none}
.phase-pill{white-space:nowrap;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;flex-shrink:0}
.phase-pill.active{background:rgba(201,168,76,.15);border-color:var(--accent);color:var(--accent)}

/* CHALLENGE CARD */
.challenge-section{padding:0 16px 16px}
.challenge-card{background:var(--surface);border:.5px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden}
.challenge-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.06),transparent);pointer-events:none}
.challenge-text{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;line-height:1.3;color:var(--text)}
.challenge-text.placeholder{color:var(--muted);font-size:18px;font-weight:400}
.btn-next{width:100%;padding:16px;border-radius:14px;border:.5px solid rgba(201,168,76,.4);background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:10px}
.btn-next:active{transform:scale(.97)}
.score-btns{display:none;gap:8px;margin-top:0}
.score-btns.visible{display:flex}
.btn-score{flex:1;padding:13px 8px;border-radius:14px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;transition:all .2s;border:.5px solid}
.btn-score:active{transform:scale(.97)}
.btn-score-user{background:linear-gradient(135deg,rgba(100,149,237,.2),rgba(100,149,237,.08));border-color:rgba(100,149,237,.4);color:#6495ed}
.btn-score-partner{background:linear-gradient(135deg,rgba(220,120,180,.2),rgba(220,120,180,.08));border-color:rgba(220,120,180,.4);color:#dc78b4}

/* QUESTS */
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:20px 20px 10px}
.quest-card{margin:0 16px 10px;background:var(--surface);border-radius:14px;border:.5px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;animation:slideUp .3s ease both}
.quest-card:active{transform:scale(.98)}
.quest-card.done{opacity:.4}
.quest-card.done .quest-check{background:rgba(76,175,80,.15);border-color:var(--success);color:var(--success)}
.quest-check{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;background:var(--surface2)}
.quest-info{flex:1}
.quest-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase}
.quest-desc{font-size:12px;color:var(--muted);margin-top:2px}
.quest-pts{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--accent)}

/* BINGO */
.bingo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px}
.bingo-item{background:var(--surface);border:.5px solid var(--border);border-radius:12px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;text-align:center;padding:8px;color:var(--muted);cursor:pointer;transition:all .25s;line-height:1.3;font-weight:500}
.bingo-item.active{background:rgba(201,168,76,.15);border-color:var(--accent);color:var(--accent);font-weight:600}

/* TOAST */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface2);border:.5px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;color:var(--accent)}
.toast.show{transform:translateX(-50%) translateY(0)}

@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pop{animation:pop .25s ease}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- UITDAGINGEN -->
<div class="page active" id="page-main">
  <div class="page-header">
    <div class="page-title">🥂 Gala Royale</div>
    <div class="page-sub" id="header-phase">Kies een fase hieronder</div>
  </div>

  <div class="score-hero">
    <div class="score-greeting">Jouw Score</div>
    <div class="score-title" id="score-display">0 pts</div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="score-user">0</div>
        <div class="stat-label">👤 Jij</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="score-partner">0</div>
        <div class="stat-label">💑 Vriendin</div>
      </div>
    </div>
  </div>

  <div class="phase-scroll" id="phase-pills"></div>

  <div class="challenge-section">
    <div class="challenge-card" id="challenge-card">
      <div class="challenge-text placeholder" id="challenge-text">Kies een fase en tik op Volgende Uitdaging</div>
    </div>
    <button class="btn-next" onclick="nextChallenge()">⚡ Volgende Uitdaging</button>
    <div class="score-btns" id="score-btns">
      <button class="btn-score btn-score-user" onclick="scoreFor('user')">👤 Ik deed het! +1</button>
      <button class="btn-score btn-score-partner" onclick="scoreFor('partner')">💑 Zij deed het! +1</button>
    </div>
  </div>
</div>

<!-- QUESTS -->
<div class="page" id="page-quests">
  <div class="page-header">
    <div class="page-title">🏆 Quests</div>
    <div class="page-sub">Verdien extra punten</div>
  </div>
  <div id="quest-list"></div>
</div>

<!-- BINGO -->
<div class="page" id="page-bingo">
  <div class="page-header">
    <div class="page-title">🎯 Bingo</div>
    <div class="page-sub">Tik aan wat je ziet — elk item eenmalig +5 pts</div>
  </div>
  <div class="bingo-grid" id="bingo-grid"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('main', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    Uitdaging
  </button>
  <button class="nav-btn" onclick="switchPage('quests', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    Quests
  </button>
  <button class="nav-btn" onclick="switchPage('bingo', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Bingo
  </button>
</nav>

<script>
const PHASES = [
  { emoji:"🚗", name:"Heenreis" },
  { emoji:"👔", name:"Verkleden" },
  { emoji:"🥂", name:"Proosten" },
  { emoji:"🍽️", name:"Diner" },
  { emoji:"💃", name:"Feest" }
];

const CHALLENGES = {
  "Heenreis": [
    "Spot een toga: iedereen 2 slokken.",
    "Eerste die 'de soos' noemt: drinkt 1 slok.",
    "Doe alsof je primus bent en wijs iemand aan die drinkt.",
    "Zing een cantus-regel — wie meedoet is vrijgesteld, rest drinkt.",
    "Noem 3 disputen in 10 seconden, anders 2 slokken.",
    "Schacht-check: wie het stijfst zit hoeft niet te drinken.",
    "Iemand zegt 'borrel': drink als pavlov-reactie.",
    "Eerste limo gespot: die persoon deelt 3 slokken uit.",
    "Selfie in de auto: wie het meest stijf kijkt wint, rest drinkt.",
    "Vraag iemand van je bak een inside joke te vertellen: wie lacht drinkt.",
    "Doe de koninklijke wave naar een willekeurige auto: iedereen drinkt mee.",
    "Verzin een regel voor het schachtenlied: wie lacht drinkt.",
    "Tel hoeveel bakgenoten er in de auto zitten: wie het eerst weet deelt 2 slokken uit."
  ],
  "Verkleden": [
    "Stropdas scheef? Die persoon drinkt 2 slokken boete.",
    "Toga niet meegebracht? Volle slok als boete.",
    "Spiegel-selfie: wie het stijfst poseert als praeses wint, rest drinkt.",
    "Maak een bakfoto met alle aanwezige bakgenoten: iedereen proosten daarna.",
    "Knoopsgat-bloem aanwezig? Proost op de outfit.",
    "Wie ruikt naar te veel eau de cologne: 1 slok.",
    "Schoen niet dicht: 2 slokken, net als een schacht op zijn eerste borrel.",
    "Noem de naam van de praeses — wie het niet weet drinkt.",
    "Vergeet iemands naam? 1 slok straf, doe het er maar aan.",
    "Pose als senaatstoto: wie lacht drinkt.",
    "Check: corsage/pin zichtbaar? Iedereen proosten.",
    "Iemand heeft de verkeerde kleur pochet: 2 slokken modestraf.",
    "Vind een bakgenoot met exact dezelfde outfit-kleur: samen proost, de rest kijkt toe."
  ],
  "Proosten": [
    "Cantus-modus: wie een lied inzet mag 3 slokken uitdelen.",
    "'Vivat! Floreat!' roepen: iedereen drinkt.",
    "Bodem omhoog — in de cantus-geest: iedereen leegt het glas.",
    "Wie proosten aanbiedt zonder praeses-flair: 1 slok straf.",
    "Proosten met de verkeerde hand: 2 slokken etiquette-straf.",
    "Noem je dispuut hardop: de rest drinkt uit jaloezie.",
    "'Gaudeamus Igitur' neuriën: wie stopt drinkt.",
    "Iemand zegt 'Gezellig': pavlov-slok.",
    "Glas leeg vóór de toast: bijvullen EN 1 extra slok.",
    "Iemand morst: diegene drinkt dubbel — klassieke schacht.",
    "Verzin een baktoast in 10 seconden: wie geen idee heeft drinkt 2 slokken.",
    "Proosten zonder oogcontact: 1 slok straf (ongeschreven regel).",
    "'Op de bak!' roepen: je bakgenoten drinken mee, de rest kijkt jalours toe."
  ],
  "Diner": [
    "Stilte langer dan 5 sec: 1 slok — saaier dan een ALV.",
    "Bestek valt: 2 slokken, net als de schacht die het glas omstootte.",
    "Serveerder vergeet iets: jij deelt 3 slokken uit als praeses.",
    "Iemand eet soep met de foerste vork: tafelfout, 2 slokken.",
    "'Smakelijk' zeggen vóór de praeses: 1 slok boete.",
    "Geef commentaar op de wijn als sommelier: rest drinkt uit respect.",
    "Tik je per ongeluk je glas aan: 1 slok — zelfs hier gelden cantus-regels.",
    "'Lekker' zeggen: drink, dat is het minste wat je kunt doen.",
    "Iemand bestelt water: medelij-slok voor de rest.",
    "Broodmandje leeg zonder te delen: 2 slokken schaamlap-straf.",
    "Toespraak begint: glas snel bijvullen, anders mis je de toast.",
    "Dessert binnengebracht: proost ter ere van de banketbakker.",
    "Noem iets waar je bak berucht om staat: iedereen lacht of drinkt."
  ],
  "Feest": [
    "Soos-jump op de dansvloer: iedereen doet mee of drinkt.",
    "DJ draait een cantus-klassieker: drink tot het refrein.",
    "Schoenen uit? 5 slokken dansboete.",
    "Dansen met een oud-lid: deel 2 slokken uit als eerbetoon.",
    "Iemand valt op de dansvloer: 3 slokken voor de getuigen.",
    "Slechte overgang door de DJ: praeses wijst aan wie drinkt.",
    "Jouw bak staat tegelijk op de dansvloer: proost op het bakjaar!",
    "Macarena: iedereen doet mee, wie stopt drinkt.",
    "Dansen met een wildvreemde: deel 2 slokken uit.",
    "Langzame dans: weigeraars drinken 2 slokken eenzaamheids-boete.",
    "Ballonnen op de dansvloer: wie er eentje kapt deelt 3 slokken uit.",
    "Iemand filmt de dansvloer: iedereen poseert of drinkt.",
    "Organiseer een bakdans in een cirkel: wie weigert drinkt 3 slokken."
  ]
};

const QUESTS = [
  { id:1,  title:"Praeses voor een Dag",  desc:"Geef een toast die iedereen hoort",               pts:75  },
  { id:2,  title:"Cantus King",           desc:"Zing een volledig lied met de juiste tekst",       pts:80  },
  { id:3,  title:"Soos-Diplomaat",        desc:"Praat met mensen van 3 verschillende disputen",    pts:60  },
  { id:4,  title:"Schacht-Supervisor",    desc:"Leg iemand een zelfverzonnen huisregel uit",       pts:40  },
  { id:5,  title:"Toga-Fotograaf",        desc:"Maak een foto met iemand in toga",                 pts:30  },
  { id:6,  title:"Borrel-Baron",          desc:"Bestel een rondje voor iedereen aan tafel",        pts:100 },
  { id:7,  title:"Netwerker",             desc:"Vraag iemands nummer die je niet kent",            pts:40  },
  { id:8,  title:"Sjaars-Mentor",         desc:"Herken een eerstejaars en geef ongewenst advies",  pts:25  },
  { id:9,  title:"Bak-Koppel",            desc:"Vraag een bakgenoot mee de dansvloer op",          pts:50  },
  { id:10, title:"Oud-Lid Gevonden",      desc:"Voer een gesprek van 5 min met een oud-lid",       pts:35  },
  { id:11, title:"Bak-Kampioen",          desc:"Verzamel alle aanwezige bakgenoten op één foto",   pts:65  },
  { id:12, title:"Bak-Toast",             desc:"Geef een speciale toast gericht aan je bak",       pts:55  }
];

const BINGO_ITEMS = [
  "Toga gespot","Schacht herkend","Cantus gezongen","Stropdas scheef",
  "Hele bak aanwezig","Soos-dans","Borrel besteld","Dispuut-pin gezien",
  "Toespraak gehoord","Iemand valt","Lege fles","Fotobooth rij",
  "Matching outfits","Oud-lid gespot","Bak-foto gemaakt"
];

let scores = { user: 0, partner: 0 };
let currentPhase = null;
let completedQuests = new Set();
let bingoDone = new Set();

function saveState() {
  localStorage.setItem('gala_scores', JSON.stringify(scores));
  localStorage.setItem('gala_quests', JSON.stringify([...completedQuests]));
  localStorage.setItem('gala_bingo', JSON.stringify([...bingoDone]));
}

function loadState() {
  try {
    const s = localStorage.getItem('gala_scores');
    if (s) scores = JSON.parse(s);
    const q = localStorage.getItem('gala_quests');
    if (q) completedQuests = new Set(JSON.parse(q));
    const b = localStorage.getItem('gala_bingo');
    if (b) bingoDone = new Set(JSON.parse(b));
  } catch(e) {}
}

function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function addScore(who, amount) {
  scores[who] += amount;
  const elId = who === 'user' ? 'score-user' : 'score-partner';
  const el = document.getElementById(elId);
  el.textContent = scores[who];
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  document.getElementById('score-display').textContent = (scores.user + scores.partner) + ' pts';
  saveState();
}

function scoreFor(who) {
  addScore(who, 1);
  showToast(who === 'user' ? '👤 +1 punt!' : '💑 +1 punt!');
}

function initPhases() {
  const container = document.getElementById('phase-pills');
  PHASES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'phase-pill';
    btn.textContent = p.emoji + ' ' + p.name;
    btn.onclick = () => selectPhase(p, btn);
    container.appendChild(btn);
  });
}

function selectPhase(phase, btn) {
  document.querySelectorAll('.phase-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPhase = phase.name;
  document.getElementById('header-phase').textContent = phase.emoji + ' ' + phase.name;
  document.getElementById('challenge-text').textContent = 'Tik op Volgende Uitdaging!';
  document.getElementById('challenge-text').classList.remove('placeholder');
}

function nextChallenge() {
  if (!currentPhase) { showToast('Kies eerst een fase!'); return; }
  const list = CHALLENGES[currentPhase];
  const text = list[Math.floor(Math.random() * list.length)];
  const el = document.getElementById('challenge-text');
  el.classList.remove('placeholder');
  el.textContent = text;
  document.getElementById('score-btns').classList.add('visible');
}

function renderQuests() {
  const list = document.getElementById('quest-list');
  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'Missies';
  list.appendChild(title);
  QUESTS.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'quest-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.id = 'quest-' + q.id;
    card.innerHTML = `
      <div class="quest-check" id="check-${q.id}">☐</div>
      <div class="quest-info">
        <div class="quest-title">${q.title}</div>
        <div class="quest-desc">${q.desc}</div>
      </div>
      <div class="quest-pts">+${q.pts}</div>
    `;
    if (completedQuests.has(q.id)) {
      card.classList.add('done');
      card.querySelector('.quest-check').textContent = '✓';
    }
    card.onclick = () => completeQuest(q.id, q.pts);
    list.appendChild(card);
  });
}

function completeQuest(id, pts) {
  if (completedQuests.has(id)) { showToast('Al voltooid!'); return; }
  completedQuests.add(id);
  document.getElementById('quest-' + id).classList.add('done');
  document.getElementById('check-' + id).textContent = '✓';
  addScore('user', pts);
  showToast('+' + pts + ' punten!');
}

function renderBingo() {
  const grid = document.getElementById('bingo-grid');
  BINGO_ITEMS.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'bingo-item' + (bingoDone.has(i) ? ' active' : '');
    el.textContent = item;
    el.onclick = () => {
      if (bingoDone.has(i)) return;
      bingoDone.add(i);
      el.classList.add('active');
      addScore('user', 5);
      showToast('+5 punten! Bingo!');
    };
    grid.appendChild(el);
  });
}

loadState();
document.getElementById('score-user').textContent = scores.user;
document.getElementById('score-partner').textContent = scores.partner;
document.getElementById('score-display').textContent = (scores.user + scores.partner) + ' pts';
initPhases();
renderQuests();
renderBingo();
</script>
</body>
